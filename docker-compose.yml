version: "3"

services:
  base-node:
    image: ubuntu:22.04
    container_name: base-node

    restart: unless-stopped

    ports:
      - "30303:30303"
      - "8545:8545"

    volumes:
      - ./data:/data
      - ./logs:/logs

    environment:
      - NODE_ENV=production

    healthcheck:
      test: ["CMD", "echo", "healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

    command: tail -f /dev/null
